version: 2
updates:
  # Enable version updates for npm dependencies in the root directory
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps):"
      include: "scope"
    pull-request-branch-name:
      separator: "/"
    allow:
      - dependency-type: "all"
    rebase-strategy: "auto"

  # Enable version updates for npm dependencies in the pkg subdirectory
  - package-ecosystem: "npm"
    directory: "/pkg/kube-prometheus-stack-metrics"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps):"
      include: "scope"
    pull-request-branch-name:
      separator: "/"
    allow:
      - dependency-type: "all"
    rebase-strategy: "auto"

  # Optional: Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:30"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci(deps):"
    pull-request-branch-name:
      separator: "/"
